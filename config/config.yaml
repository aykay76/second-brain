server:
  port: 8080

db:
  host: localhost
  port: 5433
  name: pa
  user: pa
  password: pa
  sslmode: disable
  max_open_conns: 10
  max_idle_conns: 5

llm:
  provider: ollama
  ollama:
    base_url: http://localhost:11434
    embedding_model: nomic-embed-text
    chat_model: llama3.1
    vision_model: llama3.2-vision:11b
  openai:
    api_key: ${OPENAI_API_KEY}
    embedding_model: text-embedding-3-small
    chat_model: gpt-4o
  groq:
    api_key: ${GROQ_API_KEY}
    embedding_model: nomic-embed-text
    chat_model: gpt-4o
    vision_model: llama-3.2-11b-vision-preview

sources:
  filesystem:
    enabled: false
    paths:
      - d:/knowledge
    extensions: [".md", ".txt"]

  github:
    enabled: false
    token: ${GITHUB_TOKEN}
    sync_starred: true
    sync_gists: true
    include_repos: []

  arxiv:
    enabled: false
    categories: ["cs.AI", "cs.SE", "cs.DC", "cs.CR"]
    keywords: ["knowledge graph", "RAG", "embeddings", "LLM agents"]
    max_results: 200
    initial_lookback: "30d"

  trending:
    enabled: true
    languages: ["Go", "Python", "Rust", "TypeScript"]
    fetch_readme: true

  youtube:
    enabled: true
    api_key: ${YOUTUBE_API_KEY}
    # channels: ["UCVHFbqXqoYvEWM1Ddxl0QDg"]
    search_terms: ["Go programming", "distributed systems", "AI agents"]
    max_results: 50

  onedrive:
    enabled: false
    client_id: ${ONEDRIVE_CLIENT_ID}
    tenant_id: "consumers"
    folders: ["/Documents/Engineering"]
    extensions: [".md", ".txt", ".docx", ".pdf"]
    token_file: "config/onedrive_tokens.json"

  thenewstack:
    enabled: false
    max_articles: 50

  vision:
    enabled: true
    paths:
      - D:/media/photos
    extensions: [".png", ".jpg", ".jpeg"]
    vision_model: llama3.2-vision:11b
    batch_size: 10
    max_concurrent_images: 2

discovery:
  enabled: true
  similarity_threshold: 0.80
  max_candidates: 10
  batch_size: 50

enrichment:
  enabled: true
  batch_size: 20
  max_tags: 5

digest:
  default_period: weekly
  week_start_day: monday

insights:
  enabled: true
  gems_lookback_days: 90
  serendipity_limit: 5
  topic_window_weeks: 4
  depth_min_artifacts: 2
  velocity_rolling_weeks: 4
  similarity_threshold: 0.75
