services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pa
      POSTGRES_USER: pa
      POSTGRES_PASSWORD: pa
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pa -d pa"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
